global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'observability-poc'

# Alert rules
rule_files:
  - /etc/prometheus/alert_rules.yml

# AlertManager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── Prometheus itself ───────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── ApiService ──────────────────────────────────────────────────────────────
  - job_name: 'api-service'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  # ── OrderService ────────────────────────────────────────────────────────────
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8081']
    metrics_path: /metrics
    scrape_interval: 10s

  # ── InventoryService ────────────────────────────────────────────────────────
  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8082']
    metrics_path: /metrics
    scrape_interval: 10s
