
# ── Milestone 3: Metrics & Alerting (Prometheus + Grafana + AlertManager) ───
# Start: docker-compose -f docker-compose.m3.yml up --build
# Prometheus:   http://localhost:9090
# Grafana:      http://localhost:3000  (admin / observability)
# AlertManager: http://localhost:9093

services:

  api:
    build:
      context: ./src/ApiService
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Seq__ServerUrl=http://seq:5341
      - Jaeger__OtlpEndpoint=http://jaeger:4317
      - Services__OrderService=http://order-service:8081
      - Services__InventoryService=http://inventory-service:8082
    depends_on:
      - seq
      - jaeger
      - order-service
      - inventory-service
    networks:
      - obs-net
    restart: unless-stopped

  order-service:
    build:
      context: ./src/OrderService
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8081
      - Seq__ServerUrl=http://seq:5341
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    networks:
      - obs-net
    restart: unless-stopped

  inventory-service:
    build:
      context: ./src/InventoryService
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8082
      - Seq__ServerUrl=http://seq:5341
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    networks:
      - obs-net
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: seq
    ports:
      - "8888:80"
      - "5341:5341"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    volumes:
      - seq-data:/data
    networks:
      - obs-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - obs-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - obs-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - obs-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=observability
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/api-service.json
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - obs-net
    restart: unless-stopped

volumes:
  seq-data:
  prometheus-data:
  grafana-data:

networks:
  obs-net:
    driver: bridge
